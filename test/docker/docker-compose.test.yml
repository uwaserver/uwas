services:
  uwas:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "9443:9443"
    volumes:
      - ./uwas-test.yaml:/etc/uwas/uwas.yaml:ro
      - ./www:/var/www:ro
      - uwas-cache:/var/cache/uwas
      - uwas-certs:/var/lib/uwas/certs
    depends_on:
      - php
      - db
    networks:
      testnet:
        aliases:
          - static.test
          - php.test
          - proxy.test
          - redirect.test
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9443/api/v1/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  php:
    image: php:8.3-fpm-alpine
    volumes:
      - ./www:/var/www:ro
    networks:
      - testnet

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: test_root_pass
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: test_wp_pass
    tmpfs:
      - /var/lib/mysql
    networks:
      - testnet

  upstream:
    image: python:3.12-alpine
    command: >
      python3 -c "
      from http.server import HTTPServer, BaseHTTPRequestHandler
      import json
      class H(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.end_headers()
              self.wfile.write(json.dumps({'status': 'ok', 'backend': 'upstream'}).encode())
          def log_message(self, *a): pass
      HTTPServer(('0.0.0.0', 8080), H).serve_forever()
      "
    networks:
      - testnet

  tester:
    image: alpine:3.19
    depends_on:
      uwas:
        condition: service_healthy
    volumes:
      - ./test.sh:/test.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache curl jq bash > /dev/null 2>&1 && bash /test.sh"]
    environment:
      UWAS_HOST: uwas
      UWAS_PORT: "80"
      ADMIN_HOST: uwas
      ADMIN_PORT: "9443"
      API_KEY: "test-key-12345"
    networks:
      - testnet

networks:
  testnet:
    driver: bridge

volumes:
  uwas-cache:
  uwas-certs:
