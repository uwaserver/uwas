global:
    worker_count: auto
    max_connections: 65536
    http_listen: 0.0.0.0:8080
    https_listen: :443
    http3: true
    pid_file: /var/run/uwas.pid
    log_level: info
    log_format: text
    trusted_proxies: []
    timeouts:
        read:
            duration: 30s
        write:
            duration: 1m0s
        idle:
            duration: 2m0s
        shutdown_grace:
            duration: 30s
    admin:
        listen: 0.0.0.0:9443
        enabled: true
        api_key: ""
    mcp:
        enabled: false
        listen: 127.0.0.1:9444
    acme:
        email: ""
        ca_url: https://acme-v02.api.letsencrypt.org/directory
        storage: /var/lib/uwas/certs
        dns_provider: ""
        dns_credentials: {}
        on_demand: false
        on_demand_ask: ""
    cache:
        enabled: true
        memory_limit: 134217728
        disk_path: /var/cache/uwas
        disk_limit: 10737418240
        default_ttl: 300
        grace_ttl: 86400
        stale_while_revalidate: false
        purge_key: ""
    alerting:
        enabled: true
        webhook_url: ""
