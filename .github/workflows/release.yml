name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go vet $GO_PACKAGES

      - name: Vulnerability scan
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go run golang.org/x/vuln/cmd/govulncheck@latest $GO_PACKAGES

      - name: Test
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go test -v -count=1 -timeout 600s -p 1 $GO_PACKAGES 2>&1 | tee /tmp/test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: /tmp/test-output.log

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Build dashboard
        working-directory: web/dashboard
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run lint
          npm run build

  release:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Build dashboard (embedded into binary)
        working-directory: web/dashboard
        run: npm ci && npm run build

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          # Pass untrusted ref/sha via env, not direct ${{ }} interpolation into
          # the shell — a crafted tag name could otherwise inject commands.
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          go build \
            -ldflags="-s -w -X 'github.com/uwaserver/uwas/internal/build.Version=${REF_NAME}' -X 'github.com/uwaserver/uwas/internal/build.Commit=${COMMIT_SHA}'" \
            -o uwas-${{ matrix.suffix }} \
            ./cmd/uwas

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uwas-${{ matrix.suffix }}
          path: uwas-${{ matrix.suffix }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          # Only the uwas-* binary artifacts — exclude the validate job's
          # test-output artifact so it isn't attached to the release.
          pattern: uwas-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          (cd dist && sha256sum uwas-* > SHA256SUMS)

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Untrusted tag name via env, not shell interpolation (injection).
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --latest --generate-notes
          fi
          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --latest --prerelease=false
