name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -p 1 -timeout 300s -count=1 ./...

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: TypeScript check
        working-directory: web/dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        working-directory: web/dashboard
        run: npm run build
