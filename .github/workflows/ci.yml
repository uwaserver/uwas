name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo. Grant write per-job if ever
# required, never at the top level.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Pin tool versions (not @latest) for reproducible CI; Dependabot
      # (.github/dependabot.yml) proposes bumps.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Lint (go vet + staticcheck)
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go vet $GO_PACKAGES
          staticcheck $GO_PACKAGES

      - name: Vulnerability scan
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          govulncheck $GO_PACKAGES

      - name: Test
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go test -v -count=1 -timeout 600s $GO_PACKAGES 2>&1 | tee /tmp/test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: /tmp/test-output.log

  race:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mysql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

      - name: Race detector
        run: |
          # Skip admin package: its tests require Docker daemon for docker compose
          # integration tests. Race detection for admin verified locally.
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/' | grep -v '/internal/admin')"
          go test -race -count=1 -timeout 900s $GO_PACKAGES
        env:
          UWAS_DB_HOST: "127.0.0.1"
          UWAS_DB_PORT: "3306"
          UWAS_DB_USER: "root"
          UWAS_DB_PASSWORD: "root"

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Type check
        working-directory: web/dashboard
        run: npx tsc -b

      - name: Audit dependencies
        working-directory: web/dashboard
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: web/dashboard
        run: npm run lint

      - name: Build
        working-directory: web/dashboard
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Audit dependencies
        working-directory: docs/site
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: docs/site
        run: npm run lint

      - name: Build
        working-directory: docs/site
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test, dashboard]
    # Uses the system-installed Google Chrome (channel: 'chrome') instead of
    # downloading from Playwright CDN. Reliable across all GitHub Actions
    # runners since ubuntu-latest ships Chrome pre-installed.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Build dashboard (go:embed)
        working-directory: web/dashboard
        run: npm run build

      - name: Build UWAS binary
        run: CGO_ENABLED=0 go build -o /tmp/uwas ./cmd/uwas

      - name: Run E2E tests
        working-directory: web/dashboard
        run: node_modules/.bin/playwright test
        env:
          CI: "true"
          UWAS_BIN: "/tmp/uwas"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/dashboard/playwright-report/
