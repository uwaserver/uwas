name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go vet $GO_PACKAGES

      - name: Vulnerability scan
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go run golang.org/x/vuln/cmd/govulncheck@latest $GO_PACKAGES

      - name: Test
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go test -v -count=1 -timeout 600s -p 1 $GO_PACKAGES 2>&1 | tee /tmp/test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: /tmp/test-output.log

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Type check
        working-directory: web/dashboard
        run: npx tsc -b

      - name: Audit dependencies
        working-directory: web/dashboard
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: web/dashboard
        run: npm run lint

      - name: Build
        working-directory: web/dashboard
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Audit dependencies
        working-directory: docs/site
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: docs/site
        run: npm run lint

      - name: Build
        working-directory: docs/site
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test, dashboard]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Build dashboard (go:embed)
        working-directory: web/dashboard
        run: npm run build

      - name: Build UWAS binary
        run: CGO_ENABLED=0 go build -o /tmp/uwas ./cmd/uwas

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: /opt/pw-browsers
          key: pw-${{ runner.os }}-${{ hashFiles('web/dashboard/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: web/dashboard
        run: node_modules/.bin/playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
        timeout-minutes: 5

      - name: Run E2E tests
        working-directory: web/dashboard
        run: node_modules/.bin/playwright test
        env:
          CI: "true"
          UWAS_BIN: "/tmp/uwas"
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/dashboard/playwright-report/
