name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vet
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go vet $GO_PACKAGES

      - name: Vulnerability scan
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          govulncheck $GO_PACKAGES

      - name: Test
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go test -v -count=1 -timeout 600s $GO_PACKAGES 2>&1 | tee /tmp/test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output
          path: /tmp/test-output.log

  race:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Race detector
        run: |
          GO_PACKAGES="$(go list ./... | grep -v '/node_modules/')"
          go test -race -count=1 -timeout 900s $GO_PACKAGES

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Type check
        working-directory: web/dashboard
        run: npx tsc -b

      - name: Audit dependencies
        working-directory: web/dashboard
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: web/dashboard
        run: npm run lint

      - name: Build
        working-directory: web/dashboard
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Audit dependencies
        working-directory: docs/site
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: docs/site
        run: npm run lint

      - name: Build
        working-directory: docs/site
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test, dashboard]
    # continue-on-error: Playwright CDN is occasionally unreachable from
    # GitHub Actions runners. E2E failures must not block the main CI pipeline;
    # the Go test + dashboard build jobs are the real gate. E2E runs green
    # when the CDN is reachable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Build dashboard (go:embed)
        working-directory: web/dashboard
        run: npm run build

      - name: Build UWAS binary
        run: CGO_ENABLED=0 go build -o /tmp/uwas ./cmd/uwas

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: /opt/pw-browsers
          key: pw-${{ runner.os }}-${{ hashFiles('web/dashboard/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: web/dashboard
        run: |
          # Retry logic: Playwright CDN (cdn.playwright.dev) can be slow or
          # unreachable from some GitHub Actions regions. Retry up to 3 times
          # with increasing backoff before giving up.
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt"
            node_modules/.bin/playwright install chromium && break
            echo "::endgroup::"
            if [ "$attempt" -eq 3 ]; then
              echo "::warning::Playwright browser install failed after 3 attempts"
              exit 1
            fi
            echo "Retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "60000"
        timeout-minutes: 12

      - name: Run E2E tests
        working-directory: web/dashboard
        run: node_modules/.bin/playwright test
        env:
          CI: "true"
          UWAS_BIN: "/tmp/uwas"
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/dashboard/playwright-report/
