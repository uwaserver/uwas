name: Deploy Docs

on:
  push:
    branches: [main]
    paths: [docs/site/**]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install and build
        working-directory: docs/site
        run: |
          npm ci
          npm run build

      - name: Package pages artifact
        run: |
          tar --dereference --hard-dereference -cvf github-pages.tar -C docs/site/dist .
          gzip -9 -n github-pages.tar

      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: github-pages.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
