services:
  uwas:
    build: .
    ports:
      - "80:80"
      - "443:443"
      - "9443:9443"
    environment:
      # Admin API key (read by docker/uwas.yaml via ${UWAS_ADMIN_KEY}).
      # UWAS rejects a publicly-bound admin listener without auth, so a key is
      # required for the dashboard + container healthcheck to work. Override on
      # the host or in a .env file; never commit a real key.
      - UWAS_ADMIN_KEY=${UWAS_ADMIN_KEY:-please-change-this-admin-key}
    volumes:
      - uwas_config:/etc/uwas
      - ./data/www:/var/www
      - certs:/var/lib/uwas/certs
      - cache:/var/cache/uwas
    depends_on:
      - php
      - db
    restart: unless-stopped

  php:
    image: php:8.3-fpm-alpine
    volumes:
      - ./data/www:/var/www
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-uwas_root}
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: ${DB_PASSWORD:-uwas_wp}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  uwas_config:
  certs:
  cache:
  db_data:
